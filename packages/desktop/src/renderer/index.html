<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- T2-1: app: scheme lets vault-relative images (app://vault/assets/x.png) render in-editor.
       SP0 Task 4: media-src is locked to local sources only ('self' app: blob:) — remote
       audio/video bytes are re-served via app://, never fetched directly. No directive may
       name a remote http(s) origin (enforced by tests/csp.test.ts). -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: app:; media-src 'self' app: blob:; font-src 'self' data:; connect-src 'self';" />
  <title>Stellavault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg, #0a0a0f);
      color: var(--ink, #e0e0f0);
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
