name: Deploy Landing Page to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - docs/landing/**
      - images/screenshots/**
      - index.html
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          mkdir -p _site/images/screenshots
          cp index.html _site/
          cp images/screenshots/*.png _site/images/screenshots/ 2>/dev/null || true
          cp images/screenshots/*.webm _site/images/screenshots/ 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
