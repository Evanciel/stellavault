name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # The committed package-lock.json is Windows-generated and omits Linux
        # native optional deps (@rollup/rollup-linux-x64-gnu) due to npm/cli#4828.
        # `npm ci` "succeeds" but vitest/vite then crash at runtime loading rollup.
        # Remove the lockfile so npm resolves this runner's platform binaries fresh
        # (same workaround as desktop-release.yml). Ranges stay pinned in package.json.
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build core
        run: npm run build --workspace=@stellavault/core

      - name: Build CLI
        run: npm run build --workspace=@stellavault/cli

      - name: Build graph UI (optional — native rollup may fail on some platforms)
        run: npm run build --workspace=@stellavault/graph || true

      - name: Bundle CLI (graph UI included if available)
        run: npm run bundle

      - name: Verify bundle
        run: |
          node dist/stellavault.js --version
          node dist/stellavault.js --help | head -5

      - name: Run smoke tests
        run: node tests/smoke.mjs

      - name: Run core tests
        run: npx vitest run
        working-directory: packages/core

      - name: Run desktop unit + IPC security tests
        # T1-2/T1-3: now gating — a security regression (e.g. the import-asset
        # srcPath hole, a broken assertInsideVault, an unclamped settings patch)
        # FAILS the build. Tests are pure logic (no Electron runtime required).
        run: npx vitest run
        working-directory: packages/desktop

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        # Same cross-platform lockfile workaround as the build job (npm/cli#4828):
        # the committed Windows lockfile omits Linux native optional deps, and may
        # lag package.json (e.g. an inert, not-yet-installed dep) — npm ci then
        # hard-fails on the mismatch. Resolve fresh from package.json ranges.
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps --no-fund
      - name: Check for known vulnerabilities (gating, baseline-allowlisted)
        # T1-2: production audit is now GATING. A plain `npm audit
        # --audit-level=high` cannot be used directly: the repo currently carries
        # a documented baseline of high/critical advisories that are either
        # unfixable upstream (`xlsx`) or only "fixable" via a semver-MAJOR
        # downgrade of the local embedder (`@xenova/transformers` → 2.0.1, which
        # would gut the multilingual-embedding moat) — both out of scope here.
        # A naive gate would be permanently red and block every PR.
        #
        # Approach: parse `npm audit --json` and FAIL only on a high/critical
        # advisory for a module OUTSIDE the documented baseline allowlist. Any
        # NEW vulnerable dependency fails the build (the regression the gate
        # exists to catch); the existing baseline does not. SHRINK this list as
        # fixes land — never grow it without an explicit decision.
        shell: bash
        env:
          # Baseline as of 2026-06-15 (see desktop-upgrade-proposal-v2 T1-2).
          # Shrunk 7->5: @xmldom/xmldom (->0.8.13) and fast-uri (->3.1.2) were patched
          # via root package.json `overrides` (non-major), so their advisories cleared.
          # Remaining 5 stay: xlsx (no upstream fix) + the onnx/protobuf/transformers
          # chain (only "fixable" via the moat-breaking @xenova/transformers 2.0.1 downgrade).
          AUDIT_ALLOWLIST: 'xlsx @xenova/transformers onnx-proto onnxruntime-web protobufjs'
        run: |
          npm audit --production --json > audit.json || true
          node -e '
            const a = JSON.parse(require("fs").readFileSync("audit.json","utf8"));
            const allow = new Set((process.env.AUDIT_ALLOWLIST || "").split(/\s+/).filter(Boolean));
            const vulns = a.vulnerabilities || {};
            const hi = Object.values(vulns).filter(v => v.severity === "high" || v.severity === "critical");
            const offenders = hi.filter(v => !allow.has(v.name));
            if (offenders.length) {
              console.error("NEW high/critical advisories (not in baseline allowlist) — failing:");
              for (const o of offenders) console.error(`  - ${o.name} (${o.severity})`);
              process.exit(1);
            }
            console.log(`OK — ${hi.length} high/critical advisory(ies), all in documented baseline; 0 new.`);
          '
      - name: Check for secrets in code
        run: |
          ! grep -rn "sk-ant-\|ANTHROPIC_API_KEY=\|password.*=.*['\"]" packages/*/src/ --include="*.ts" --include="*.tsx" || echo "No secrets found"
